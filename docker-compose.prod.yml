services:
  app:
    image: v3il:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: v3il-app
    restart: always
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./.v3il:/app/.v3il
      - ./.lightrag:/app/.lightrag
      - /var/run/docker.sock:/var/run/docker.sock

  postgres:
    image: ghcr.io/yv1ing/postgres-for-rag:latest
    container_name: v3il-postgres
    restart: always
    environment:
      POSTGRES_USER: v3il
      POSTGRES_PASSWORD: replace-with-a-strong-database-password
      POSTGRES_DB: v3il
    ports:
      - 127.0.0.1:5432:5432
    volumes:
      - ./.postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U v3il -d v3il"]
      interval: 5s
      timeout: 5s
      retries: 20

  pgadmin:
    image: ghcr.io/yv1ing/pgadmin4:latest
    container_name: v3il-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@v3il.local
      PGADMIN_DEFAULT_PASSWORD: replace-with-a-strong-pgadmin-password
      PGADMIN_LISTEN_PORT: 5433
    ports:
      - 127.0.0.1:5433:5433
    volumes:
      - ./.pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
